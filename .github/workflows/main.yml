name: CI & CD Pipeline

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

jobs:
  # 任务 1：Windows 客户端构建 (新增，用于向 SignPath 证明构建能力)
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install -g @angular/cli
          npm ci
          cd electron && npm ci

      - name: Compile Windows Executable
        run: |
          npm run build -- --win
        env:
          NODE_ENV: production

      # --- SignPath 预留位 (申请时给审核员看的重点) ---
      # - name: Sign with SignPath
      #   uses: signpath/github-action@v1
      #   with:
      #     api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #     ... (待申请通过后完善)
      
      - name: Archive Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AilyBlockly-Windows-Package
          path: dist/aily-blockly/ # 包含所有输出：exe, yml 等

  # 任务 2：macOS 客户端构建
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install -g @angular/cli
          npm ci
          cd electron && npm ci

      - name: Compile macOS Executable
        run: |
          npm run build -- --mac
        env:
          NODE_ENV: production

      # --- Apple 代码签名和公证 ---
      - name: Import Codesign Certificates
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_SIGNING_CERT }}
          p12-password: ${{ secrets.APPLE_SIGNING_PASSWORD }}

      - name: Find DMG and ZIP files
        id: find_files
        run: |
          DMG_PATH=$(find dist/aily-blockly -name "*.dmg" -type f | head -n 1)
          ZIP_PATH=$(find dist/aily-blockly -name "*.zip" -type f | head -n 1)
          echo "dmg_path=$DMG_PATH" >> $GITHUB_OUTPUT
          echo "zip_path=$ZIP_PATH" >> $GITHUB_OUTPUT
          echo "Found DMG at: $DMG_PATH"
          echo "Found ZIP at: $ZIP_PATH"

      - name: Debug - Check files
        run: |
          echo "DMG file: ${{ steps.find_files.outputs.dmg_path }}"
          ls -lh "${{ steps.find_files.outputs.dmg_path }}"
          echo "ZIP file: ${{ steps.find_files.outputs.zip_path }}"
          ls -lh "${{ steps.find_files.outputs.zip_path }}"

      # Step 1: 提交 DMG 到 Apple 进行公证
      - name: Submit DMG for Notarization
        id: notarize_dmg
        run: |
          echo "Submitting DMG to Apple for notarization..."
          xcrun notarytool submit "${{ steps.find_files.outputs.dmg_path }}" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait \
            --timeout 30m \
            2>&1 | tee notarize_dmg_output.txt
          
          # 检查公证结果
          if grep -q "status: Accepted" notarize_dmg_output.txt; then
            echo "dmg_accepted=true" >> $GITHUB_OUTPUT
            echo "✓ DMG notarization accepted!"
          else
            echo "dmg_accepted=false" >> $GITHUB_OUTPUT
            echo "✗ DMG notarization failed or rejected"
            cat notarize_dmg_output.txt
          fi

      # Step 2: 提交 ZIP 到 Apple 进行公证
      - name: Submit ZIP for Notarization
        id: notarize_zip
        run: |
          echo "Submitting ZIP to Apple for notarization..."
          xcrun notarytool submit "${{ steps.find_files.outputs.zip_path }}" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait \
            --timeout 30m \
            2>&1 | tee notarize_zip_output.txt
          
          # 检查公证结果
          if grep -q "status: Accepted" notarize_zip_output.txt; then
            echo "zip_accepted=true" >> $GITHUB_OUTPUT
            echo "✓ ZIP notarization accepted!"
          else
            echo "zip_accepted=false" >> $GITHUB_OUTPUT
            echo "✗ ZIP notarization failed or rejected"
            cat notarize_zip_output.txt
          fi

      # Step 3: 仅在公证通过后才进行 Staple 盖章
      - name: Staple DMG (only if notarization accepted)
        if: steps.notarize_dmg.outputs.dmg_accepted == 'true'
        run: |
          echo "Stapling notarization ticket to DMG..."
          xcrun stapler staple "${{ steps.find_files.outputs.dmg_path }}"
          echo "✓ DMG stapled successfully!"

      # - name: Staple ZIP (only if notarization accepted)
      #   if: steps.notarize_zip.outputs.zip_accepted == 'true'
      #   run: |
      #     echo "Stapling notarization ticket to ZIP..."
      #     # ZIP 文件本身不能直接 staple，需要解压后 staple .app 再重新打包
      #     # 如果是 .app 在 ZIP 里，需要特殊处理
      #     xcrun stapler staple "${{ steps.find_files.outputs.zip_path }}" || echo "ZIP stapling skipped (may need .app extraction)"
      #     echo "✓ ZIP stapling completed!"

      # Step 4: 验证签名和公证
      - name: Verify Notarization and Stapling
        run: |
          echo "=== Verifying DMG ==="
          echo "Checking code signature..."
          codesign -dvv "${{ steps.find_files.outputs.dmg_path }}" || echo "DMG not code-signed"
          echo ""
          echo "Checking stapler validation..."
          xcrun stapler validate "${{ steps.find_files.outputs.dmg_path }}" || echo "DMG stapler validation failed"
          echo ""
          echo "Checking spctl (Gatekeeper)..."
          spctl -a -vvv -t install "${{ steps.find_files.outputs.dmg_path }}" || echo "DMG spctl check failed"
      
      - name: Archive macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AilyBlockly-macOS-Package
          path: dist/aily-blockly/ # 包含所有输出：dmg, zip, yml 等

  # 任务 3：发布到 GitHub Release
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: v${VERSION}"

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: AilyBlockly-Windows-Package
          path: ./release

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: AilyBlockly-macOS-Package
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            ./release/*.exe
            ./release/*.dmg
          draft: false
          prerelease: false
          update_release: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 任务 4：上传文件到服务器（与Release并行执行）
  upload-to-server:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: AilyBlockly-Windows-Package
          path: ./artifacts/windows

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: AilyBlockly-macOS-Package
          path: ./artifacts/macos

      - name: Upload files to Server (non-yml files first, yml files last)
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          SERVER_PATH: ${{ secrets.SERVER_PATH }}
        run: |
          # 安装sshpass用于密码认证
          sudo apt-get update && sudo apt-get install -y sshpass
          
          # 创建临时目录用于组织文件
          mkdir -p ./upload-temp
          
          # 复制Windows文件（exe先上传）
          echo "准备Windows文件..."
          cp ./artifacts/windows/*.exe ./upload-temp/ 2>/dev/null || echo "未找到Windows exe文件"
          
          # 复制macOS文件（dmg和zip先上传）
          echo "准备macOS文件..."
          cp ./artifacts/macos/*.dmg ./upload-temp/ 2>/dev/null || echo "未找到macOS dmg文件"
          cp ./artifacts/macos/*.zip ./upload-temp/ 2>/dev/null || echo "未找到macOS zip文件"
          
          # 先上传非yml文件
          if [ -n "$(ls -A ./upload-temp/)" ]; then
            echo "上传非yml文件到服务器..."
            sshpass -p "$SERVER_PASSWORD" scp -o StrictHostKeyChecking=no -r ./upload-temp/* "$SERVER_USER@$SERVER_HOST:$SERVER_PATH"
          fi
          
          # 最后上传yml文件
          echo "准备yml配置文件..."
          mkdir -p ./yml-files
          cp ./artifacts/windows/latest.yml ./yml-files/ 2>/dev/null || echo "未找到Windows latest.yml"
          cp ./artifacts/macos/latest-mac.yml ./yml-files/ 2>/dev/null || echo "未找到macOS latest-mac.yml"
          
          if [ -n "$(ls -A ./yml-files/)" ]; then
            echo "上传yml配置文件到服务器..."
            sshpass -p "$SERVER_PASSWORD" scp -o StrictHostKeyChecking=no -r ./yml-files/* "$SERVER_USER@$SERVER_HOST:$SERVER_PATH"
          fi
          
          echo "✓ 文件上传完成"
