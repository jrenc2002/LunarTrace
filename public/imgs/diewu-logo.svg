<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 40" width="168" height="40">
  <defs>
    <linearGradient id="dw-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c4ff"/>
      <stop offset="100%" stop-color="#3a7eff"/>
    </linearGradient>
    <linearGradient id="dw-text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00c4ff"/>
      <stop offset="100%" stop-color="#3a7eff"/>
    </linearGradient>
  </defs>
  <!-- Icon: rounded rect badge with gradient -->
  <rect x="1" y="2" width="36" height="36" rx="9" fill="url(#dw-grad)"/>
  <!-- 迭 character -->
  <text x="19" y="28" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">迭</text>
  <!-- Brand wordmark -->
  <text x="50" y="28" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" font-weight="700" fill="url(#dw-text-grad)">迭物</text>
</svg>
