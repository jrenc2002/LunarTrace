<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <title>迭物</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Font-awesome 6 -->
  <link rel="stylesheet" href="fonts/fontawesome6/css/all.min.css" />
  <!-- Icon-font -->
  <link rel="stylesheet" href="fonts/iconfont/iconfont.css">
  <!-- 内联启动画面样式，确保在 Angular 加载前就能显示 -->
  <style>
    body {
      margin: 0;
      background-color: #2b2d30;
    }
    .loading-box {
      width: 100vw;
      height: 100vh;
      background: #2b2d30;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 99;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      border-radius: 5px;
    }
    .loading-box .brand-icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      background: linear-gradient(135deg, #00c4ff, #3a7eff);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      box-shadow: 0 8px 32px rgba(58, 126, 255, 0.35);
    }
    .loading-box .brand-icon-wrap .brand-char {
      color: #fff;
      font-size: 38px;
      font-weight: 700;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1;
    }
    .loading-box .brand-name {
      font-size: 22px;
      font-weight: 700;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(90deg, #00c4ff, #3a7eff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      letter-spacing: 4px;
    }
    .loading-box .text {
      color: rgba(255,255,255,0.45);
      margin-top: 10px;
      font-size: 13px;
      letter-spacing: 1px;
    }
    .ball-grid-beat {
      width: 45px;
      height: 45px;
    }
    .ball-grid-beat > div {
      display: inline-block;
      float: left;
      width: 12px;
      height: 12px;
      margin: 1.5px;
      border-radius: 100%;
      background-color: #3a7eff;
      animation: ball-grid-beat 1.3s ease infinite;
    }
    .ball-grid-beat > div:nth-child(1) { animation-delay: 0.36s; animation-duration: 1.18s; }
    .ball-grid-beat > div:nth-child(2) { animation-delay: 0.2s; animation-duration: 1.28s; }
    .ball-grid-beat > div:nth-child(3) { animation-delay: 0.48s; animation-duration: 0.88s; }
    .ball-grid-beat > div:nth-child(4) { animation-delay: 0.28s; animation-duration: 1.28s; }
    .ball-grid-beat > div:nth-child(5) { animation-delay: 0.13s; animation-duration: 1.11s; }
    .ball-grid-beat > div:nth-child(6) { animation-delay: 0.28s; animation-duration: 0.98s; }
    .ball-grid-beat > div:nth-child(7) { animation-delay: 0.47s; animation-duration: 1.08s; }
    .ball-grid-beat > div:nth-child(8) { animation-delay: 0.36s; animation-duration: 1.38s; }
    .ball-grid-beat > div:nth-child(9) { animation-delay: 0.04s; animation-duration: 1.01s; }
    @keyframes ball-grid-beat {
      0%, 50%, 100% { transform: scale(1); opacity: 1; }
      25% { transform: scale(0.5); opacity: 0.3; }
      75% { transform: scale(0.5); opacity: 0.3; }
    }
  </style>
</head>

<body spellcheck="false">
  <app-root class="ddark">
    <div class="loading-box">
      <div class="brand-icon-wrap">
        <span class="brand-char">迭</span>
      </div>
      <div class="brand-name">迭物</div>
      <div class="loader">
        <div class="ball-grid-beat">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>
      </div>
      <div class="text">正在启动...</div>
    </div>
  </app-root>
</body>

</html>
